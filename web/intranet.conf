<VirtualHost *:80>
    ServerName intranet.centro.local
    DocumentRoot /var/www/intranet

    # 1. ZONA PÚBLICA: Abierta para todo el mundo
    <Directory /var/www/intranet/public>
        Require all granted
    </Directory>

    # 2. ZONA PROFESORES: Solo entra el grupo "profesores" de LDAP
    <Directory /var/www/intranet/profesores>
        AuthType Basic
        AuthName "Identifícate - Zona Profesores"
        AuthBasicProvider ldap

        # Conexión al servidor LDAP de la VM1
        AuthLDAPURL "ldap://192.168.0.21/ou=usuarios,dc=centro,dc=local?uid"

        # Validación del grupo
        # Comprobamos directamente el ID del grupo en el perfil del usuario
        Require ldap-attribute gidNumber=5000
    </Directory>

    # 3. ZONA ALUMNOS: Solo entra el grupo "alumnos" de LDAP
    <Directory /var/www/intranet/alumnos>
        AuthType Basic
        AuthName "Identifícate - Zona Alumnos"
        AuthBasicProvider ldap

        # Conexión al servidor LDAP de la VM1
        AuthLDAPURL "ldap://192.168.0.21/ou=usuarios,dc=centro,dc=local?uid"

        # Validación del grupo
        Require ldap-attribute gidNumber=5001
    </Directory>
</VirtualHost>
